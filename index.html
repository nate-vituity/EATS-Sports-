<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Day Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --tommy: #2563eb;
    --tommy-light: #dbeafe;
    --tommy-mid: #93bbfd;
    --emma: #e85d75;
    --emma-light: #fde4e9;
    --emma-mid: #f5a3b5;
    --avery: #16a34a;
    --avery-light: #dcfce7;
    --avery-mid: #86efac;
    --bg: #faf9f7;
    --card-bg: #ffffff;
    --text: #1e1e1e;
    --text-secondary: #6b7280;
    --border: #e8e6e1;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.06);
    --shadow-hover: 0 2px 6px rgba(0,0,0,0.06), 0 8px 24px rgba(0,0,0,0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    text-align: center;
    padding: 48px 24px 20px;
  }

  .header h1 {
    font-family: 'Caveat', cursive;
    font-size: 3rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .header p {
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin-top: 6px;
    font-weight: 400;
  }

  /* Filters */
  .filters {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 12px 24px 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 100px;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.01em;
  }

  .filter-btn:hover { border-color: #ccc; }

  .filter-btn.active-all {
    background: var(--text);
    color: white;
    border-color: var(--text);
  }

  .filter-btn.active-tommy {
    background: var(--tommy);
    color: white;
    border-color: var(--tommy);
  }

  .filter-btn.active-emma {
    background: var(--emma);
    color: white;
    border-color: var(--emma);
  }

  .filter-btn.active-avery {
    background: var(--avery);
    color: white;
    border-color: var(--avery);
  }

  /* Legend */
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    padding: 14px 24px 4px;
    font-size: 0.82rem;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .legend-dot.tommy { background: var(--tommy); }
  .legend-dot.emma { background: var(--emma); }
  .legend-dot.avery { background: var(--avery); }

  /* Timeline */
  .timeline {
    max-width: 560px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .month-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-secondary);
    padding: 24px 0 10px 4px;
  }

  .month-label:first-child { padding-top: 8px; }

  .game-card {
    background: var(--card-bg);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
    transition: box-shadow 0.2s ease, transform 0.15s ease;
    animation: fadeUp 0.35s ease both;
    border-left: 4px solid transparent;
  }

  .game-card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
  }

  .game-card.tommy { border-left-color: var(--tommy); }
  .game-card.emma { border-left-color: var(--emma); }
  .game-card.avery { border-left-color: var(--avery); }

  .game-card.hidden {
    display: none;
  }

  .game-card.past {
    opacity: 0.45;
  }

  .date-block {
    min-width: 52px;
    text-align: center;
    flex-shrink: 0;
  }

  .date-block .day-name {
    font-size: 0.65rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-secondary);
  }

  .date-block .day-num {
    font-size: 1.6rem;
    font-weight: 800;
    line-height: 1.15;
    color: var(--text);
  }

  .game-card.tommy .date-block .day-num { color: var(--tommy); }
  .game-card.emma .date-block .day-num { color: var(--emma); }
  .game-card.avery .date-block .day-num { color: var(--avery); }

  .divider {
    width: 1px;
    height: 36px;
    background: var(--border);
    flex-shrink: 0;
  }

  .game-info {
    flex: 1;
    min-width: 0;
  }

  .game-matchup {
    font-size: 0.92rem;
    font-weight: 600;
    line-height: 1.35;
    color: var(--text);
  }

  .game-matchup .team-name {
    font-weight: 700;
  }

  .game-meta {
    font-size: 0.78rem;
    color: var(--text-secondary);
    margin-top: 3px;
    font-weight: 400;
    display: flex;
    flex-wrap: wrap;
    gap: 4px 12px;
  }

  .game-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .badge {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 9px;
    border-radius: 6px;
    flex-shrink: 0;
    align-self: flex-start;
    margin-top: 2px;
  }

  .badge.tommy {
    background: var(--tommy-light);
    color: var(--tommy);
  }

  .badge.emma {
    background: var(--emma-light);
    color: var(--emma);
  }

  .badge.avery {
    background: var(--avery-light);
    color: var(--avery);
  }

  .no-games {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-secondary);
    font-size: 0.95rem;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Same-day cluster */
  .same-day-note {
    display: inline-block;
    background: linear-gradient(135deg, var(--tommy-light), var(--emma-light), var(--avery-light));
    color: var(--text);
    font-size: 0.72rem;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 6px;
    margin-left: 4px;
  }

  @media (max-width: 480px) {
    .header h1 { font-size: 2.4rem; }
    .game-card { padding: 14px 14px; gap: 10px; }
    .date-block { min-width: 44px; }
    .date-block .day-num { font-size: 1.35rem; }
    .game-matchup { font-size: 0.85rem; }
    .badge { font-size: 0.62rem; padding: 2px 7px; }
    .cal-btn { padding: 3px 7px; font-size: 0.62rem; }
  }

  .cal-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 0.68rem;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .cal-btn:hover {
    border-color: #aaa;
    color: var(--text);
    background: #fff;
  }

  .download-all-wrap {
    display: flex;
    justify-content: center;
    padding: 4px 24px 0;

  .download-all-btn {
    font-family: 'Outfit', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    padding: 10px 24px;
    border-radius: 100px;
    border: 2px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .download-all-btn:hover {
    border-color: #aaa;
    box-shadow: var(--shadow);
  }
</style>
</head>

// Convert "9:00 AM" style time to minutes for proper sorting
function timeToMinutes(t) {
  const [timePart, period] = t.split(' ');
  let [h, m] = timePart.split(':').map(Number);
  if (period === 'PM' && h !== 12) h += 12;
  if (period === 'AM' && h === 12) h = 0;
  return h * 60 + m;
}

// Sort by date, then by time (earliest first)
games.sort((a, b) => {
  if (a.date !== b.date) return a.date.localeCompare(b.date);
  return timeToMinutes(a.time) - timeToMinutes(b.time);
});

const today = new Date().toISOString().slice(0, 10);

function renderGames(filter = 'all') {
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  let currentMonth = '';

  const filtered = filter === 'all' ? games : games.filter(g => g.kid === filter);

  if (filtered.length === 0) {
    timeline.innerHTML = '<div class="no-games">No games to show.</div>';
    return;
  }

  // Find time conflicts: 2+ games at the same date+time
  const timeSlots = {};
  filtered.forEach(g => {
    const key = `${g.date}|${g.time}`;
    if (!timeSlots[key]) timeSlots[key] = [];
    timeSlots[key].push(g.kid);
  });
  // Only flag slots with 2+ different kids
  const conflictSlots = {};
  Object.entries(timeSlots).forEach(([key, kids]) => {
    const uniqueKids = [...new Set(kids)];
    if (uniqueKids.length >= 2) conflictSlots[key] = uniqueKids.length;
  });

  let prevSlotKey = '';

  filtered.forEach((g, i) => {
    // Month header
    if (g.month !== currentMonth) {
      currentMonth = g.month;
      const monthEl = document.createElement('div');
      monthEl.className = 'month-label';
      monthEl.textContent = currentMonth;
      timeline.appendChild(monthEl);
    }

    // Time conflict note
    const slotKey = `${g.date}|${g.time}`;
    if (conflictSlots[slotKey] && slotKey !== prevSlotKey) {
      const count = conflictSlots[slotKey];
      const note = document.createElement('div');
      note.className = 'same-day-note';
      note.textContent = `⚡ ${count} games at the same time!`;
      timeline.appendChild(note);
    }
    prevSlotKey = slotKey;

    const isPast = g.date < today;

    const card = document.createElement('div');
    card.className = `game-card ${g.kid}${isPast ? ' past' : ''}`;
    card.dataset.kid = g.kid;
    card.style.animationDelay = `${i * 0.03}s`;

    const sportIcons = { baseball: '⚾', soccer: '⚽', softball: '🥎', football: '🏈' };
    const kidNames = { tommy: 'Tommy', emma: 'Emma', avery: 'Avery' };
    const sportIcon = sportIcons[g.sport] || '🏅';
    const kidName = kidNames[g.kid] || g.kid;
    const practiceLabel = g.eventType === 'practice' ? ' · Practice' : '';

    const gameIndex = games.indexOf(g);

    card.innerHTML = `
      <div class="date-block">
        <div class="day-name">${g.dayName}</div>
        <div class="day-num">${g.day}</div>
      </div>
      <div class="divider"></div>
      <div class="game-info">
        <div class="game-matchup">${highlightTeam(g.matchup, g.kid)}</div>
        <div class="game-meta">
          <span>🕐 ${g.time}</span>
          <span>📍 ${g.location}</span>
        </div>
        <button class="cal-btn" onclick="event.stopPropagation(); downloadSingleGame(${gameIndex})">📅 Add to Cal</button>
      </div>
      <div class="badge ${g.kid}">${sportIcon} ${kidName}${practiceLabel}</div>
    `;

    timeline.appendChild(card);
  });
}

function highlightTeam(matchup, kid) {
  const teams = {
    tommy: ['Golden Bears'],
    emma: ['Tornados', 'Bengals'],
    avery: ['Force', 'Chiefs']
  };
  const kidTeams = teams[kid] || [];
  let result = matchup;
  kidTeams.forEach(team => {
    result = result.replace(team, `<span class="team-name">${team}</span>`);
  });
  return result;
}

// === iCal helpers ===

function pad2(n) { return String(n).padStart(2, '0'); }

function gameToIcsDatetime(g) {
  // Parse "2026-04-11" and "9:00 AM" into iCal DTSTART/DTEND (1.5hr duration)
  const [year, month, day] = g.date.split('-').map(Number);
  const mins = timeToMinutes(g.time);
  const startH = Math.floor(mins / 60);
  const startM = mins % 60;
  const endMins = mins + 90; // assume 1.5 hour games
  const endH = Math.floor(endMins / 60);
  const endM = endMins % 60;

  const dtstart = `${year}${pad2(month)}${pad2(day)}T${pad2(startH)}${pad2(startM)}00`;
  const dtend = `${year}${pad2(month)}${pad2(day)}T${pad2(endH)}${pad2(endM)}00`;
  return { dtstart, dtend };
}

function gameToVevent(g) {
  const { dtstart, dtend } = gameToIcsDatetime(g);
  const kidNames = { tommy: 'Tommy', emma: 'Emma', avery: 'Avery' };
  const sportIcons = { baseball: '⚾', soccer: '⚽', softball: '🥎', football: '🏈' };
  const kidName = kidNames[g.kid] || g.kid;
  const sportIcon = sportIcons[g.sport] || '🏅';
  const summary = `${sportIcon} ${kidName}: ${g.matchup}`;
  const uid = `${g.date}-${g.time.replace(/[: ]/g,'')}-${g.kid}@gamedayschedule`;

  return [
    'BEGIN:VEVENT',
    `DTSTART;TZID=America/New_York:${dtstart}`,
    `DTEND;TZID=America/New_York:${dtend}`,
    `SUMMARY:${summary}`,
    `LOCATION:${g.location}`,
    `UID:${uid}`,
    `DTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z`,
    'END:VEVENT'
  ].join('\r\n');
}

function makeIcsFile(vevents) {
  const cal = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//GameDay//Schedule//EN',
    'CALSCALE:GREGORIAN',
    'BEGIN:VTIMEZONE',
    'TZID:America/New_York',
    'BEGIN:DAYLIGHT',
    'TZOFFSETFROM:-0500',
    'TZOFFSETTO:-0400',
    'DTSTART:19700308T020000',
    'RRULE:FREQ=YEARLY;BYMONTH=3;BYDAY=2SU',
    'TZNAME:EDT',
    'END:DAYLIGHT',
    'BEGIN:STANDARD',
    'TZOFFSETFROM:-0400',
    'TZOFFSETTO:-0500',
    'DTSTART:19701101T020000',
    'RRULE:FREQ=YEARLY;BYMONTH=11;BYDAY=1SU',
    'TZNAME:EST',
    'END:STANDARD',
    'END:VTIMEZONE',
    ...vevents,
    'END:VCALENDAR'
  ].join('\r\n');
  return cal;
}

function downloadIcs(content, filename) {
  const blob = new Blob([content], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadSingleGame(index) {
  const g = games[index];
  const vevent = gameToVevent(g);
  const ics = makeIcsFile([vevent]);
  const kidNames = { tommy: 'Tommy', emma: 'Emma', avery: 'Avery' };
  const kidName = kidNames[g.kid] || g.kid;
  downloadIcs(ics, `${kidName}-${g.date}.ics`);
}

function downloadAllIcs() {
  const vevents = games.map(g => gameToVevent(g));
  const ics = makeIcsFile(vevents);
  downloadIcs(ics, 'all-games-spring-2026.ics');
}

function filterGames(filter) {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.className = 'filter-btn';
  });

  const btns = document.querySelectorAll('.filter-btn');
  if (filter === 'all') btns[0].classList.add('active-all');
  else if (filter === 'tommy') btns[1].classList.add('active-tommy');
  else if (filter === 'emma') btns[2].classList.add('active-emma');
  else if (filter === 'avery') btns[3].classList.add('active-avery');

  renderGames(filter);
}

renderGames();
</script>
